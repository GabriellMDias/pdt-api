services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdt}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-pdt}\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    restart: unless stopped
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # carrega tudo do .env (Swagger, JWT, PG externo...) e sobrescreve o DATABASE_URL
    env_file:
      - .env
    environment:
      PORT: ${PORT:-4495}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pdt"
      TZ: "America/Sao_Paulo"
    ports:
      - "${PORT:-4495}:4495"
    volumes:
      # persiste uploads
      - ./uploads:/usr/src/app/uploads

volumes:
  postgres: