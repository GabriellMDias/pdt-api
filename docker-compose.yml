version: "3.8"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pdt
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d pdt"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # carrega tudo do .env (Swagger, JWT, PG externo...) e sobrescreve o DATABASE_URL
    env_file:
      - .env
    environment:
      PORT: ${PORT:-4495}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pdt"
      TZ: "America/Sao_Paulo"
    ports:
      - "${PORT:-4495}:4495"
    volumes:
      # persiste uploads
      - ./uploads:/usr/src/app/uploads

volumes:
  postgres:
